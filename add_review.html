<!DOCTYPE html>
{% extends 'base.html' %}

{% block title %}Add Review{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h3 class="card-title">Add Review for {{ business.name if business else 'this business' }}</h3>
                    {% if error %}
                        <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}
                    {% if success %}
                        <div class="alert alert-success">{{ success }}</div>
                    {% endif %}
                    <form id="add-review-form" method="POST" action="{{ url_for('add_review', business_id=business.id) }}">
                        <div class="mb-3">
                            <label for="rating" class="form-label">Rating (1-5) <span class="text-danger">*</span></label>
                            <input type="number" id="rating" name="rating" min="1" max="5" class="form-control w-25" required>
                        </div>
                        <div class="mb-3">
                            <label for="reviewer_name" class="form-label">Your Name <span class="text-danger">*</span></label>
                            <input type="text" id="reviewer_name" name="reviewer_name" class="form-control" required readonly value="{{ session.get('username') or '' }}">
                        </div>
                        <div class="mb-3">
                            <label for="title" class="form-label">Review Title <span class="text-danger">*</span></label>
                            <input type="text" id="title" name="title" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="comment" class="form-label">Comment <span class="text-danger">*</span></label>
                            <textarea id="comment" name="comment" class="form-control" required></textarea>
                        </div>
                        <input type="hidden" name="business_id" value="{{ business.id }}">
                        {% if captcha_question %}
                            <div class="mb-3 text-center">
                                <label class="form-label">{{ captcha_question }}</label>
                                <input type="text" name="captcha" class="form-control w-50 mx-auto" required placeholder="Enter the result">
                            </div>
                        {% endif %}
                        <div class="text-center">
                            <button type="submit" class="btn btn-primary">Submit Review</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
