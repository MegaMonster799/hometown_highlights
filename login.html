<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Page metadata and responsive design -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- Bootstrap CSS for styling -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

        <!-- Custom CSS -->
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

        <title>Login</title>
    </head>
    <body>
        <!-- Login form container -->
        <div class="login">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-body">
                                <!-- Page heading -->
                                <h3 class="card-title text-center">Login to Hometown Highlights</h3>

                                <!-- Error and success messages -->
                                {% if error %}
                                    <div class="alert alert-danger">{{ error }}</div>
                                {% endif %}
                                {% if success %}
                                    <div class="alert alert-success">{{ success }}</div>
                                {% endif %}

                                <!-- Login form -->
                                <form method="POST" action="/">
                                    <!-- Username input -->
                                    <div class="mb-3 text-center">
                                        <label for="username" class="form-label">Username <span class="text-danger">*</span></label>
                                        <input type="text" id="username" name="username" class="form-control w-75 mx-auto" required>
                                    </div>

                                    <!-- Password input -->
                                    <div class="mb-3 text-center">
                                        <label for="password" class="form-label">Password <span class="text-danger">*</span></label>
                                        <input type="password" id="password" name="password" class="form-control w-75 mx-auto" required>
                                    </div>

                                    <!-- CAPTCHA challenge, shown only if needed -->
                                    {% if captcha_question %}
                                        <div class="mb-3 text-center">
                                            <label class="form-label">{{ captcha_question }}</label>
                                            <input type="text" name="captcha" class="form-control w-50 mx-auto" required placeholder="Enter the result">
                                        </div>
                                    {% endif %}

                                    <!-- Submit button -->
                                    <div class="text-center">
                                        <button type="submit" class="btn btn-primary">Login</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Link to signup page -->
        <div class="signup-link text-center mt-3">
            <a href="{{ url_for('signup') }}">Don't have an account? Sign up here!</a>
        </div>

        <!-- Marketing / thematic images -->
        <div class="foodAndBeverageBusinessImage">
            <img src="{{url_for('static', filename='images/foodsAndBeverages.jpeg')}}" alt="Small Business selling Food Image">
            <img src="{{url_for('static', filename='images/retail.jpg')}}" alt="Small Business selling Retail Image">
            <img src="{{url_for('static', filename='images/services.jpg')}}" alt="Small Business Services Image">
        </div>

        <div class="healthAndWellnessBusinessImage">
            <img src="{{url_for('static', filename='images/healthAndWellness.jpg')}}" alt="Health and Wellness Small Business Image">
            <img src="{{url_for('static', filename='images/entertainment.jpg')}}" alt="Entertainment Small Business">
        </div>

        <!-- Bootstrap JS bundle for interactive components -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    </body>
</html>
